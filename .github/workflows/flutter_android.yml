name: Flutter Android

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK
        run: |
          flutter build apk --debug \
            --dart-define=APP_ENV=staging \
            --dart-define=SUPABASE_URL="${{ secrets.STAGING_SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.STAGING_SUPABASE_ANON_KEY }}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: seal-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Build Android release APK
        run: |
          flutter build apk --release \
            --dart-define=APP_ENV=production \
            --dart-define=SUPABASE_URL="${{ secrets.PRODUCTION_SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}"

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: seal-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
